site:
  name: 'My Test Site'
  url: 'https://mytestsite.com'
  description: 'This is a test site using the Crossroads SSG'
  home_description: 'Crossroads SSG is a state-of-the art static site generator written in PHP'
  theme: "phosphor"
  lang: "en"
  charset: "utf-8"
  home: "posts"
  projects:
    Chimera:
      description: "Containerized RNA analysis pipeline"
      icon: "nf-mdi-dna"
    OpenDCAD:
      description: "Scriptable 3D modelling engine"
      url: "https://github.com/duanestorey/opendcad"
      icon: "nf-fa-cube"
    Hi-Fi Amplifier:
      description: "2.1 channel amplifier with DSP crossovers"
      url: "/building-a-custom-hi-fi-5-1-amplifier-with-dts-dolby-decoding.html"
      icon: "nf-fa-music"
    Marksmith:
      description: "Modern git+SSG aware markdown editor"
      url: "https://github.com/duanestorey/marksmith"
      icon: "nf-fa-pencil"
    Polymerase:
      description: "RNA-seq TE quantification tool"
      url: "https://github.com/duanestorey/polymerase"
      icon: "nf-mdi-dna"
    Crossroads:
      description: "PHP static site generator"
      url: "https://github.com/duanestorey/crossroads"
      icon: "nf-mdi-sign_direction"
    Claude Monitor:
      description: "Claude API budget tracking"
      url: "https://github.com/duanestorey/claude-monitor"
      icon: "nf-fa-bar_chart"
content:
  pages:
    index: false
    include_date: false
    base: /
    singular: "page"
  posts:
    index: true
    include_date: true
    base: "/posts"
    singular: "post"
    taxonomy:
      category:
        - "categories"
        - "category"
      tag:
        - "tags"
        - "tag"
options:
  debug: false
  content_per_page: 20
  reading_wpm: 238
  markdown:
    auto: false
    open_command: "open %s"
  browser:
    auto: false
    open_command: "open %s"
  beautify_html: false
  noai: false
  images:
    convert_to_webp: false
    generate_responsive: true

