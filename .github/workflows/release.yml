name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, sqlite3
      - run: composer install --no-progress
      - run: composer check
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
