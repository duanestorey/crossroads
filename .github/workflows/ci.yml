name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/duanestorey/crossroads-core.git ../crossroads-core
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, sqlite3
      - name: Configure Composer to use local core
        run: |
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config repositories.core path ../crossroads-core
          composer require duanestorey/crossroads-core:@dev --no-update
          rm -f composer.lock
      - run: composer install --no-progress
      - run: composer cs-check
      - run: composer lint
      - run: composer test
